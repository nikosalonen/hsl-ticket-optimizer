<!doctype html>
<html lang="fi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HSL Ticket Optimizer</title>
        <meta
            name="description"
            content="Find the most cost-effective HSL public transport ticket option based on your travel patterns"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/src/styles/main.css" />
        <script
            src="https://cdn.counter.dev/script.js"
            data-id="da3ed73f-eedb-4dd0-acac-8e7366f8508e"
            data-utcoffset="2"
        ></script>
    </head>
    <body>
        <div id="app" class="mx-auto max-w-3xl px-5 py-8 min-h-screen">
            <header class="mb-10">
                <h1
                    class="text-4xl md:text-5xl font-extrabold tracking-tight leading-tight"
                >
                    HSL Ticket<br class="hidden sm:block" />
                    <span class="text-primary">Optimizer</span>
                </h1>
                <p class="mt-2 text-base-content/50 text-lg">
                    Find the cheapest way to ride.
                </p>
            </header>

            <main>
                <form
                    id="ticket-form"
                    class="card bg-base-100 shadow-xl border border-base-200"
                >
                    <div class="card-body gap-6">
                        <div class="grid sm:grid-cols-2 gap-5">
                            <div class="form-control">
                                <label for="zones" class="label pb-1">
                                    <span
                                        class="text-xs font-semibold uppercase tracking-widest text-base-content/50"
                                        >Zones</span
                                    >
                                </label>
                                <select
                                    id="zones"
                                    name="zones"
                                    required
                                    class="select select-bordered w-full"
                                >
                                    <option value="">Select zones</option>
                                    <option value="AB">AB</option>
                                    <option value="ABC">ABC</option>
                                    <option value="ABCD">ABCD</option>
                                    <option value="BCD">BCD</option>
                                    <option value="CD">CD</option>
                                    <option value="D">D</option>
                                </select>
                            </div>

                            <div class="form-control">
                                <label for="homemunicipality" class="label pb-1">
                                    <span
                                        class="text-xs font-semibold uppercase tracking-widest text-base-content/50"
                                        >Municipality</span
                                    >
                                </label>
                                <select
                                    id="homemunicipality"
                                    name="homemunicipality"
                                    required
                                    class="select select-bordered w-full"
                                >
                                    <option value="helsinki" selected>
                                        Helsinki
                                    </option>
                                    <option value="espoo">Espoo</option>
                                    <option value="vantaa">Vantaa</option>
                                    <option value="kauniainen">
                                        Kauniainen
                                    </option>
                                    <option value="kerava">Kerava</option>
                                    <option value="kirkkonummi">
                                        Kirkkonummi
                                    </option>
                                    <option value="sipoo">Sipoo</option>
                                    <option value="siuntio">Siuntio</option>
                                    <option value="tuusula">Tuusula</option>
                                    <option value="askola">Askola</option>
                                    <option value="hanko">Hanko</option>
                                    <option value="hausjarvi">
                                        Hausj&auml;rvi
                                    </option>
                                    <option value="inkoo">Inkoo</option>
                                    <option value="jarvenpaa">
                                        J&auml;rvenp&auml;&auml;
                                    </option>
                                    <option value="karkkila">Karkkila</option>
                                    <option value="lohja">Lohja</option>
                                    <option value="loppi">Loppi</option>
                                    <option value="mantsala">
                                        M&auml;nts&auml;l&auml;
                                    </option>
                                    <option value="nurmijarvi">
                                        Nurmij&auml;rvi
                                    </option>
                                    <option value="pornainen">Pornainen</option>
                                    <option value="porvoo">Porvoo</option>
                                    <option value="pukkila">Pukkila</option>
                                    <option value="raasepori">Raasepori</option>
                                    <option value="vihti">Vihti</option>
                                    <option value="muu">Muu</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-control">
                            <label for="tripsPerWeek" class="label pb-1">
                                <span
                                    class="text-xs font-semibold uppercase tracking-widest text-base-content/50"
                                    >Trips per week</span
                                >
                            </label>
                            <div class="flex items-baseline gap-2 mb-1">
                                <span
                                    id="tripsPerWeekValue"
                                    class="trips-value text-primary"
                                    >10</span
                                >
                                <span
                                    class="text-base-content/40 text-sm font-medium tracking-wide"
                                    >trips / week</span
                                >
                            </div>
                            <input
                                type="range"
                                id="tripsPerWeek"
                                name="tripsPerWeek"
                                min="1"
                                max="20"
                                value="10"
                                class="range range-primary w-full"
                            />
                            <div
                                class="flex justify-between text-[11px] text-base-content/30 mt-1 px-0.5 font-medium"
                            >
                                <span>1</span>
                                <span>20</span>
                            </div>
                        </div>
                    </div>
                </form>

                <div
                    id="loading"
                    class="hidden text-center py-12 text-base-content/50"
                    role="status"
                    aria-live="polite"
                >
                    <span class="loading loading-spinner loading-lg"></span>
                    <p class="mt-3 text-sm">Fetching prices from HSL...</p>
                </div>

                <div
                    id="error"
                    class="hidden alert alert-error mt-6"
                    role="alert"
                >
                    <span class="error-message"></span>
                </div>

                <div id="results" class="results hidden mt-10">
                    <div id="results-content"></div>
                    <div id="charts-section" class="space-y-4 mt-8">
                        <div
                            class="card bg-base-100 shadow border border-base-200"
                        >
                            <div class="card-body">
                                <h3
                                    class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2"
                                >
                                    Monthly Cost
                                </h3>
                                <canvas id="cost-comparison-chart"></canvas>
                            </div>
                        </div>
                        <div
                            class="card bg-base-100 shadow border border-base-200"
                        >
                            <div class="card-body">
                                <h3
                                    class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2"
                                >
                                    Cost vs. Trips
                                </h3>
                                <canvas id="trips-cost-chart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer
                class="mt-16 py-6 text-center text-xs text-base-content/30"
            >
                <p>Prices from HSL. Estimates for comparison only.</p>
            </footer>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
